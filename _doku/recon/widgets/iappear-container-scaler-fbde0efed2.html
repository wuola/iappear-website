<style>
  :root {
    /* --- EINSTELLUNGEN --- */
    --scale: 0.6;           
    --base-width: 130px;
    --base-height: 56px;
    
    /* Farben */
    --track-bg: #121212;
    --track-border: #ffffff;
    --thumb-bg: #2A2A2A;
    --thumb-border: #444444;
    --icon-active: #FFFFFF;
    --icon-inactive: #555555;
    
    --anim-duration: 4s;
    --easing: cubic-bezier(0.45, 0.05, 0.55, 0.95); /* Weicherer Ease für Safari */
  }

  /* Container für Skalierung */
  .iappear-container-scaler {
    display: flex; /* Besser als inline-block für Safari */
    justify-content: center;
    align-items: center;
    transform: scale(var(--scale));
    transform-origin: center center;
    /* Verhindert Blurring bei Skalierung in Chrome/Safari */
    backface-visibility: hidden; 
    -webkit-font-smoothing: antialiased;
  }

  .iappear-loop-toggle-safari {
    width: var(--base-width);
    height: var(--base-height);
    position: relative;
    /* Isolation erstellt einen neuen Stacking Context -> verhindert Glitches */
    isolation: isolate; 
  }

  .toggle-track {
    position: relative;
    width: 100%;
    height: 100%;
    background-color: var(--track-bg);
    border-radius: 999px;
    border: 1px solid var(--track-border);
    box-sizing: border-box;
    overflow: hidden;
    /* Safari Border-Radius Fix */
    -webkit-mask-image: -webkit-radial-gradient(white, black);
  }

  .toggle-thumb-animated {
    position: absolute;
    top: 0;
    left: 0;
    /* Exakt 50%, kein calc(+px), um Sub-Pixel-Rendering Fehler zu vermeiden */
    width: 50%; 
    height: 100%;
    background-color: var(--thumb-bg);
    border-right: 1px solid var(--thumb-border); /* Nur border innen */
    border-left: 1px solid var(--thumb-border);
    /* Border-radius muss etwas kleiner sein als Track, damit es sauber aussieht */
    border-radius: 999px; 
    box-sizing: border-box;
    z-index: 1;
    
    /* Safari Performance Booster */
    will-change: transform;
    transform: translate3d(0,0,0); 
    animation: moveThumbSafely var(--anim-duration) var(--easing) infinite;
  }

  .icon-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    z-index: 2;
    pointer-events: none; /* Klicks gehen durch */
  }

  .icon-box {
    flex: 1; /* Zwingt beide Boxen auf exakt 50% Breite */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .icon {
    width: 24px;
    height: 24px;
    /* GPU Force für SVGs in Safari */
    transform: translateZ(0);
  }

  /* --- ANIMATIONEN --- */

  /* Nutzung von translate3d statt translateX für Hardware-Beschleunigung */
  @keyframes moveThumbSafely {
    0%, 15% { transform: translate3d(0, 0, 0); }
    50%, 65% { transform: translate3d(100%, 0, 0); }
    100% { transform: translate3d(0, 0, 0); }
  }

  .map-icon-animated {
    animation: colorMap var(--anim-duration) var(--easing) infinite;
  }
  @keyframes colorMap {
    0%, 15% { color: var(--icon-active); }
    50%, 65% { color: var(--icon-inactive); }
    100% { color: var(--icon-active); }
  }

  .suitcase-icon-animated {
    animation: colorSuitcase var(--anim-duration) var(--easing) infinite;
  }
  @keyframes colorSuitcase {
    0%, 15% { color: var(--icon-inactive); }
    50%, 65% { color: var(--icon-active); }
    100% { color: var(--icon-inactive); }
  }
</style>
