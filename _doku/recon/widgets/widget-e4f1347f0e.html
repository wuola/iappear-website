<div class="target-icon-container">
  <style>
    /* --- ZENTRALE STEUERUNG --- */
    .target-icon-container {
      /* Farbe des Icons (Ring und Punkt) */
      --target-color: #ffffff; 

      /* Dicke des äußeren Rings */
      --stroke-width: 8px; 

      /* Deckkraft des gesamten Elements (0.0 bis 1.0) */
      --target-opacity: 1; 

      /* ANIMATIONS-EINSTELLUNGEN */
      --pulse-scale: 1.15;     /* Wie stark es sich ausdehnt (1.15 = 15%) */
      --pulse-speed: 2.5s;    /* Dauer eines Atemzugs */

      /* Größe des Widgets in Readymag */
      width: 40px; 
      height:40px;
      display: inline-block;
    }

    .target-svg {
      width: 100%;
      height: 100%;
      display: block;
      opacity: var(--target-opacity);
      
      /* Animation anwenden */
      animation: target-pulse var(--pulse-speed) ease-in-out infinite;
      transform-origin: center;
      /* Verhindert Clipping bei Skalierung */
      overflow: visible !important; 
    }

    /* Äußerer Ring Styling */
    .outer-ring {
      fill: none;
      stroke: var(--target-color);
      stroke-width: var(--stroke-width);
    }

    /* Innerer Punkt Styling */
    .inner-dot {
      fill: var(--target-color);
      stroke: none;
    }

    /* KEYFRAMES für das sanfte Pulsieren */
    @keyframes target-pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(var(--pulse-scale));
      }
      100% {
        transform: scale(1);
      }
    }
  </style>

  <svg class="target-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle class="outer-ring" cx="50" cy="50" r="25"></circle>
    <circle class="inner-dot" cx="50" cy="50" r="8"></circle>
  </svg>
</div>
