<style>
  /* Standard-Einstellung für weiche Bewegung */
  .team-piece {
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Ein federneder "Snap"-Effekt */
  }

  /* HOVER-ZUSTAND */
  
  /* Das linke Teil bewegt sich nach rechts (x+4) */
  .team-icon:hover .piece-left {
    transform: translateX(4px);
  }

  /* Das rechte Teil bewegt sich nach links (x-4) */
  .team-icon:hover .piece-right {
    transform: translateX(-4px);
  }
</style>
