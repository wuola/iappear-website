<div class="iappear-toggle-wrapper" onclick="toggleIAppear(this)">
  <div class="toggle-track">
    <div class="toggle-thumb"></div>
    <div class="icon-container">
      <svg class="icon map-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 6V22L8 18L15 22L22 18V2L15 6L8 2L1 6Z"></path>
        <path d="M8 2V18"></path>
        <path d="M15 6V22"></path>
      </svg>
      <svg class="icon suitcase-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="8" width="18" height="12" rx="2"></rect>
        <path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </div>
  </div>
</div>

<style>
  :root {
    /* --- DER GRÖSSENREGLER --- */
    /* Ändere diesen Wert (z.B. 0.8 oder 1.5), um alles zu skalieren */
    --master-scale: 0.8; 

    /* BASIS-WERTE (werden automatisch skaliert) */
    --toggle-width: calc(130px * var(--master-scale)); 
    --toggle-height: calc(56px * var(--master-scale)); 
    --icon-size: calc(24px * var(--master-scale));
    --icon-padding: calc(20px * var(--master-scale));

    /* FARBEN & LOOK */
    --track-bg: rgba(30, 30, 30, 0.6);
    --track-border: rgba(255, 255, 255, 0.2);
    --thumb-color: #2A2A2A;
    --icon-active: #FFFFFF;
    --icon-inactive: #666666;
    --transition-speed: 0.3s;
  }

  .iappear-toggle-wrapper {
    width: var(--toggle-width);
    height: var(--toggle-height);
    cursor: pointer;
    user-select: none;
    padding: 1px; 
    box-sizing: border-box;
    display: inline-block;
  }

  .toggle-track {
    position: relative;
    width: 100%;
    height: 100%;
    background-color: var(--track-bg);
    border: 1px solid var(--track-border);
    border-radius: 9999px;
    overflow: hidden;
    box-sizing: border-box;
  }

  .toggle-thumb {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%; 
    width: calc(var(--toggle-height) - 2px);
    background-color: var(--thumb-color);
    border-radius: 50%;
    z-index: 1;
    transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
  }

  .icon-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
    padding: 0 var(--icon-padding); 
    box-sizing: border-box;
  }

  .icon {
    width: var(--icon-size);
    height: var(--icon-size);
    color: var(--icon-inactive);
    transition: color var(--transition-speed);
    pointer-events: none; 
  }

  .iappear-toggle-wrapper.is-suitcase .toggle-thumb {
    transform: translateX(calc(var(--toggle-width) - var(--toggle-height)));
  }

  .iappear-toggle-wrapper:not(.is-suitcase) .map-icon { color: var(--icon-active); }
  .iappear-toggle-wrapper.is-suitcase .suitcase-icon { color: var(--icon-active); }
</style>

<script>
  function toggleIAppear(element) {
    element.classList.toggle('is-suitcase');
  }
</script>
