      <svg class="ia-icon suitcase-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"></rect><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>

</div>

<style>
  :root {
    /* --- EINSTELLUNGEN TOGGLE --- */
    --ia-scale: 1; 
    --ia-w: calc(130px * var(--ia-scale)); 
    --ia-h: calc(56px * var(--ia-scale)); 

    /* --- EINSTELLUNGEN HINWEIS --- */
    --hand-size: 35px;
    --hand-opacity: 0.9;
    --hand-speed: 3s;        /* Gesamtdauer der Animation */
    --hand-distance: 85px;   /* Wie weit sie schiebt */
    --ripple-color: rgba(255, 255, 255, 0.4);
  }

  /* Stabilisierung */
  .ia-emergency-toggle {
    width: var(--ia-w); height: var(--ia-h);
    cursor: pointer; user-select: none; padding: 1px;
    box-sizing: border-box; display: inline-block;
    position: relative; z-index: 999999 !important;
  }

  /* Mickey Hand & Wellen Setup */
  .ia-mickey-hint {
    position: absolute;
    top: 60%; left: -5px;
    width: var(--hand-size); height: var(--hand-size);
    pointer-events: none;
    opacity: var(--hand-opacity);
    animation: mickeyGroove var(--hand-speed) ease-in-out infinite;
    z-index: 10;
  }

  .ia-mickey-hand {
    width: 100%; height: 100%;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  }

  /* Die Ripple/Wellen-Animation */
  .ia-ripple {
    position: absolute;
    top: 50%; left: 50%;
    width: 20px; height: 20px;
    background: var(--ripple-color);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    animation: rippleEffect var(--hand-speed) ease-in-out infinite;
  }

  /* Animation: Gleiten & Neigen */
  @keyframes mickeyGroove {
    0%, 100% { transform: translateX(0) rotate(-15deg); }
    15%, 85% { transform: translateX(0) rotate(-15deg); } /* Pause links */
    50% { transform: translateX(var(--hand-distance)) rotate(15deg); }
    65% { transform: translateX(var(--hand-distance)) rotate(15deg); } /* Pause rechts */
  }

  /* Animation: Wellen-Puls an den Endpunkten */
  @keyframes rippleEffect {
    0%, 100% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    5%, 95% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    15%, 50%, 85% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    55% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    60% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
  }

  /* --- RESTLICHER STYLING CODE (Stabil) --- */
  .ia-track { position: relative; width: 100%; height: 100%; background: rgba(30, 30, 30, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 999px; overflow: hidden; }
  .ia-thumb { position: absolute; top: 0; left: 0; height: 100%; width: calc(var(--ia-h) - 2px); background: #2A2A2A; border-radius: 50%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .ia-icon-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 calc(20px * var(--ia-scale)); box-sizing: border-box; z-index: 2; }
  .ia-icon { width: calc(24px * var(--ia-scale)); height: calc(24px * var(--ia-scale)); transition: color 0.3s; pointer-events: none; }
  .ia-emergency-toggle.is-suitcase .ia-thumb { transform: translateX(calc(var(--ia-w) - var(--ia-h))); }
  .ia-emergency-toggle:not(.is-suitcase) .map-svg { color: #fff; }
  .ia-emergency-toggle:not(.is-suitcase) .suitcase-svg { color: #666; }
  .ia-emergency-toggle.is-suitcase .map-svg { color: #666; }
  .ia-emergency-toggle.is-suitcase .suitcase-svg { color: #fff; }
</style>

<script>
  (function() {
    const MAP_ID = "697ba7fbcf5bfecdf2fbda6b"; 
    const LIST_ID = "696de09bbc8a902b21afbfd1"; 
    function setIAViewState(isSuitcase) {
      const map = document.querySelector('[data-id="' + MAP_ID + '"]');
      const list = document.querySelector('[data-id="' + LIST_ID + '"]');
      if (map && list) {
        [map, list].forEach(el => el.style.setProperty('transition', 'opacity 0.4s ease-in-out', 'important'));
        if (isSuitcase) {
          map.style.setProperty('opacity', '0', 'important'); map.style.setProperty('pointer-events', 'none', 'important');
          list.style.setProperty('opacity', '1', 'important'); list.style.setProperty('pointer-events', 'auto', 'important');
        } else {
          map.style.setProperty('opacity', '1', 'important'); map.style.setProperty('pointer-events', 'auto', 'important');
          list.style.setProperty('opacity', '0', 'important'); list.style.setProperty('pointer-events', 'none', 'important');
        }
      }
    }
    window.runIAppearToggle = function(element) { 
      element.classList.toggle('is-suitcase'); 
      setIAViewState(element.classList.contains('is-suitcase')); 
    };
    window.addEventListener('load', function() { setTimeout(function() { setIAViewState(true); }, 1000); });
  })();
</script>
