<style>
  :root {
    /* --- POSITIONIERUNG (HIER ÄNDERN) --- */
    --distance-top: 300px;  /* Abstand zwischen Navi (oben) und Schalter (unten) */
    
    /* --- CONFIG --- */
    --ia-scale: 0.6; 
    --base-w: 130px; 
    --base-h: 56px;
    --thumb-size: 56px; 
    --move-dist: 74px; 
    --ia-bg: rgba(30, 30, 30, 0.6);
    --ia-border: rgba(255, 255, 255, 0.2);
    --ia-thumb-c: #2A2A2A;
    --hand-size: 30px; 
    --hand-distance: 60px;
  }

  /* --- LAYOUT WRAPPER --- */
  .ia-guide-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    margin-top: 0px; 
    z-index: 1001;
    position: relative;
    /* Damit Klicks durch den leeren Raum dazwischen auf das Handy gehen: */
    pointer-events: none; 
  }

  /* --- NAVIGATION --- */
  .ia-nav-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.3);
    padding: 8px 16px;
    border-radius: 50px;
    border: 0.5px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(4px);
    /* Buttons müssen klickbar sein */
    pointer-events: auto;
  }
  
  .ia-nav-btn {
    background: #222;
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 50px;
    cursor: pointer;
    padding: 6px 14px;
    font-size: 14px;
    transition: background 0.2s;
  }
  .ia-nav-btn:hover { background: #333; }
  
  #step-counter-label {
    font-family: sans-serif;
    color: #fff;
    font-size: 12px;
    min-width: 60px;
    text-align: center;
  }

  /* --- TOGGLE SCALER --- */
  .ia-toggle-scaler {
    /* HIER PASSIERT DIE VERSCHIEBUNG */
    margin-top: var(--distance-top);
    
    transform: scale(var(--ia-scale));
    transform-origin: center top;
    backface-visibility: hidden;
    -webkit-font-smoothing: antialiased;
    /* Toggle muss klickbar sein */
    pointer-events: auto;
  }

  /* --- TOGGLE TRACK (Safari Safe) --- */
  .ia-emergency-toggle {
    width: var(--base-w);
    height: var(--base-h);
    position: relative;
    cursor: pointer;
    isolation: isolate; 
  }

  .ia-track {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--ia-bg);
    border: 2px solid var(--ia-border); 
    border-radius: 999px;
    overflow: hidden;
    box-sizing: border-box;
    -webkit-mask-image: -webkit-radial-gradient(white, black);
  }

  /* --- THUMB --- */
  .ia-thumb {
    position: absolute;
    top: -1px; left: -1px;
    width: var(--thumb-size);
    height: var(--thumb-size);
    background: var(--ia-thumb-c);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    box-sizing: border-box;
    z-index: 1;
    will-change: transform;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    transform: translate3d(0, 0, 0);
  }

  .ia-emergency-toggle.is-suitcase .ia-thumb {
    transform: translate3d(var(--move-dist), 0, 0);
  }

  /* --- ICONS --- */
  .ia-icons-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    box-sizing: border-box;
    z-index: 2;
    pointer-events: none;
  }
  
  .ia-icon-slot { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .ia-icon { width: 24px; height: 24px; transition: color 0.3s; }

  .ia-emergency-toggle:not(.is-suitcase) .map-svg { color: #fff; }
  .ia-emergency-toggle.is-suitcase .suitcase-svg { color: #fff; }
  .ia-emergency-toggle:not(.is-suitcase) .suitcase-svg, 
  .ia-emergency-toggle.is-suitcase .map-svg { color: #666; }


  /* --- MICKEY --- */
  .ia-mickey-hint {
    position: absolute;
    top: 60px; /* Unter dem Toggle */
    left: 20px;
    width: var(--hand-size);
    pointer-events: none;
    z-index: 10;
    animation: mickeyGroove 2.8s ease-in-out infinite;
  }
  
  .ia-mickey-hand { width: 100%; height: 100%; filter: drop-shadow(1px 3px 5px rgba(0,0,0,0.4)); }
  .ia-mickey-hand path { fill: #fff; }

  .ia-ripple {
    position: absolute;
    top: 30%; left: 30%;
    width: 20px; height: 20px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    animation: rippleEffect 2.8s ease-in-out infinite;
  }

  @keyframes mickeyGroove {
    0%, 100% { transform: translate3d(0,0,0) rotate(-12deg); }
    15%, 85% { transform: translate3d(0,0,0) rotate(-12deg); }
    50%, 65% { transform: translate3d(var(--hand-distance), 0, 0) rotate(12deg); }
  }

  @keyframes rippleEffect {
    0%, 100%, 15%, 50%, 85% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    5%, 55% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    12%, 62% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
  }

<script>
(function() {
  const PATH_A = {
    1: { text: "697b7e436d4b28b8ed18b9c9", suitcase: "696de09bbc8a902b21afbfd1", map: "697ba7fbcf5bfecdf2fbda6b" },
    2: { text: "69806806263ec92b6b9f2ee9", suitcase: "696de6b7a91657db94e14817", map: "698065d7d90582656b39d99f" },
    3: { text: "69806814655aa5f8e2977b3a", suitcase: "696de6027fe5832773a20ea9", map: "698067251c5dfa5d7f1fd965" },
    4: { text: "6980683ac9eb0f5b705dbf01", suitcase: "696de2a8f87a3f06286a08de", map: "696de2a8f87a3f06286a08de" }
  };
  const ICONS = ["697b8e871597dafc050739f6", "697b8e8978bef8f204a9200f", "697b8e88d12261fe790f5cb2", "697b8e8858b78c25bd195e4e", "697b8e896c172d21a9574188", "697b8e8a152de8515fedc8a2"];

  let currentStep = 1;
  let isSuitcase = true; 
  let mickeyClicked = false;

  window.handleToggleClick = function(el) {
    mickeyClicked = true;
    isSuitcase = !isSuitcase;
    if(isSuitcase) { el.classList.add('is-suitcase'); } else { el.classList.remove('is-suitcase'); }
    updateView();
  };

  window.changeStep = function(dir) {
    currentStep += dir;
    if (currentStep > 4) currentStep = 1;
    if (currentStep < 1) currentStep = 4;
    updateView();
  };

  function updateView() {
    const label = document.getElementById('step-counter-label');
    if(label) label.innerText = `Schritt ${currentStep}`;
    
    const mickey = document.getElementById('mickey-layer');
    if(mickey) mickey.style.display = (currentStep === 1 && !mickeyClicked) ? 'block' : 'none';
    
    const widget = document.getElementById('ia-toggle-widget');
    if(widget) {
        if(currentStep === 4) {
            widget.style.opacity = '0';
            widget.style.pointerEvents = 'none';
        } else {
            widget.style.opacity = '1';
            widget.style.pointerEvents = 'auto';
        }
    }

    document.querySelectorAll('.ia-active').forEach(el => el.classList.remove('ia-active'));

    const step = PATH_A[currentStep];
    if(step) {
        show(step.text);
        show(isSuitcase ? step.suitcase : step.map);
    }
    if (currentStep === 4) {
      ICONS.forEach(id => show(id));
    }
  }

  function show(id) {
    const el = document.querySelector('[data-id="' + id + '"]');
    if (el) el.classList.add('ia-active');
  }

  const safetyLoop = setInterval(updateView, 200);
  setTimeout(() => clearInterval(safetyLoop), 5000);
  updateView();
})();
</script>
