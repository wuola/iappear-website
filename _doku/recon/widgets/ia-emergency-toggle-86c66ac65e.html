<div class="ia-emergency-toggle is-suitcase" onclick="runIAppearToggle(this)">
  <div class="ia-track">
    <div class="ia-thumb"></div>
    <div class="ia-icon-box">
      <svg class="ia-icon map-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6V22L8 18L15 22L22 18V2L15 6L8 2L1 6Z"></path><path d="M8 2V18"></path><path d="M15 6V22"></path></svg>
      <svg class="ia-icon suitcase-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"></rect><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    </div>
  </div>
</div>

<style>
  :root {
    --ia-scale: 0.6; /* Hier skalieren */
    --ia-w: calc(130px * var(--ia-scale)); 
    --ia-h: calc(56px * var(--ia-scale)); 
    --ia-bg: rgba(30, 30, 30, 0.6);
    --ia-border: rgba(255, 255, 255, 0.2);
    --ia-thumb-c: #2A2A2A;
  }

  .ia-emergency-toggle {
    width: var(--ia-w); height: var(--ia-h);
    cursor: pointer; user-select: none; padding: 1px;
    box-sizing: border-box; display: inline-block;
    position: relative; z-index: 999999 !important;
  }

  .ia-track {
    position: relative; width: 100%; height: 100%;
    background: var(--ia-bg); border: 1px solid var(--ia-border);
    border-radius: 999px; overflow: hidden;
  }

  .ia-thumb {
    position: absolute; top: 0; left: 0;
    height: 100%; width: calc(var(--ia-h) - 2px);
    background: var(--ia-thumb-c); border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .ia-icon-box {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 calc(20px * var(--ia-scale)); box-sizing: border-box; z-index: 2;
  }

  .ia-icon { width: calc(24px * var(--ia-scale)); height: calc(24px * var(--ia-scale)); transition: color 0.3s; pointer-events: none; }
  
  /* Logik-Zustände */
  .ia-emergency-toggle.is-suitcase .ia-thumb { transform: translateX(calc(var(--ia-w) - var(--ia-h))); }
  .ia-emergency-toggle:not(.is-suitcase) .map-svg { color: #fff; }
  .ia-emergency-toggle:not(.is-suitcase) .suitcase-svg { color: #666; }
  .ia-emergency-toggle.is-suitcase .map-svg { color: #666; }
  .ia-emergency-toggle.is-suitcase .suitcase-svg { color: #fff; }
</style>

<script>
  (function() {
    const MAP_ID = "697ba7fbcf5bfecdf2fbda6b"; 
    const LIST_ID = "696de09bbc8a902b21afbfd1"; 

    function setIAViewState(isSuitcase) {
      // Suche direkt über IDs
      const map = document.querySelector('[data-id="' + MAP_ID + '"]');
      const list = document.querySelector('[data-id="' + LIST_ID + '"]');

      if (map && list) {
        // Sanftes Polishing mit Transition
        [map, list].forEach(el => el.style.setProperty('transition', 'opacity 0.4s ease-in-out', 'important'));

        if (isSuitcase) {
          map.style.setProperty('opacity', '0', 'important');
          map.style.setProperty('pointer-events', 'none', 'important');
          list.style.setProperty('opacity', '1', 'important');
          list.style.setProperty('pointer-events', 'auto', 'important');
        } else {
          map.style.setProperty('opacity', '1', 'important');
          map.style.setProperty('pointer-events', 'auto', 'important');
          list.style.setProperty('opacity', '0', 'important');
          list.style.setProperty('pointer-events', 'none', 'important');
        }
      }
    }

    // Die globale Funktion für den Klick
    window.runIAppearToggle = function(element) {
      element.classList.toggle('is-suitcase');
      setIAViewState(element.classList.contains('is-suitcase'));
    };

    // Nur ein einziges Mal beim Laden ausführen, wenn Readymag fertig ist
    window.addEventListener('load', function() {
      setTimeout(function() {
        setIAViewState(true); // Start auf Koffer
      }, 1000);
    });
  })();
</script>
