<div class="network-bg-container">
    <svg class="network-svg-full" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
        <defs>
            <filter height="300%" width="300%" y="-100%" x="-100%" id="glow-pure">
                <feGaussianBlur result="blur" stdDeviation="3"></feGaussianBlur>
                <feComposite operator="over" in2="blur" in="SourceGraphic"></feComposite>
            </filter>
        </defs>

        <g opacity="0.2" stroke-dasharray="4,6" stroke-width="1" stroke="#ffffff" fill="none" class="wires">
            <path d="M500,50 V250"></path>
            <path d="M500,250 H250 V400"></path>
            <path d="M500,250 H750 V400"></path>
        </g>

        <g opacity="0.5" filter="url(#glow-pure)" fill="#ffffff">
            <circle r="4" cy="50" cx="500"></circle>
            <circle r="4" cy="400" cx="250"></circle>
            <circle r="4" cy="400" cx="750"></circle>
        </g>

        <circle filter="url(#glow-pure)" fill="#ffffff" r="3" opacity="0">
            <animateMotion path="M500,50 V250" dur="5s" keyPoints="0;1;1" keyTimes="0;0.35;1" calcMode="linear" repeatCount="indefinite"></animateMotion>
            <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.05;0.35;0.36;1" dur="5s" repeatCount="indefinite"></animate>
        </circle>
        
        <circle filter="url(#glow-pure)" fill="#ffffff" r="3" opacity="0">
            <animateMotion path="M500,250 H250 V400" dur="5s" keyPoints="0;0;1;1" keyTimes="0;0.36;0.70;1" calcMode="linear" repeatCount="indefinite"></animateMotion>
            <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.36;0.70;0.75;1" dur="5s" repeatCount="indefinite"></animate>
        </circle>

        <circle filter="url(#glow-pure)" fill="#ffffff" r="3" opacity="0">
            <animateMotion path="M500,250 H750 V400" dur="5s" keyPoints="0;0;1;1" keyTimes="0;0.36;0.70;1" calcMode="linear" repeatCount="indefinite"></animateMotion>
            <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.36;0.70;0.75;1" dur="5s" repeatCount="indefinite"></animate>
        </circle>
    </svg>
</div>

<style>
/* CSS nur noch für Layout und statische Styles */
.network-bg-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    pointer-events: none;
}

.network-svg-full {
    width: 100%;
    height: auto;
    overflow: visible;
}

/* Sanftes Fließen der Hintergrundlinien (Das funktioniert in Safari meist gut via CSS) */
.wires path {
    animation: dashFlow 20s linear infinite;
}
@keyframes dashFlow {
    to { stroke-dashoffset: -100; }
}
</style>
