<style>
  :root {
    /* --- PARAMETER SCHALTER (Von dir optimiert) --- */
    --ia-scale: 0.6; 
    --ia-w: calc(130px * var(--ia-scale)); 
    --ia-h: calc(56px * var(--ia-scale)); 
    --ia-bg: rgba(30, 30, 30, 0.6);
    --ia-border: rgba(255, 255, 255, 0.2);
    --ia-thumb-c: #2A2A2A;

    /* --- PARAMETER HAND (Von dir optimiert) --- */
    --hand-size: 18px;
    --hand-start-x: 12px;
    --hand-distance: 45px;
    --hand-speed: 2.8s;
    --hand-tilt: 12deg;
    --ripple-color: rgba(255, 255, 255, 0.5);
  }

  /* Stabilisierung & Hover-Effekt */
  .ia-emergency-toggle {
    width: var(--ia-w); height: var(--ia-h);
    cursor: pointer; user-select: none; padding: 1px;
    box-sizing: border-box; display: inline-block;
    position: relative; z-index: 999999 !important;
  }

  .ia-emergency-toggle:hover .ia-mickey-hint {
    opacity: 0 !important;
    transition: opacity 0.3s ease;
  }

  /* TRACK & THUMB LOGIK */
  .ia-track { position: relative; width: 100%; height: 100%; background: var(--ia-bg); border: 1px solid var(--ia-border); border-radius: 999px; overflow: hidden; }
  .ia-thumb { position: absolute; top: 0; left: 0; height: 100%; width: calc(var(--ia-h) - 2px); background: var(--ia-thumb-c); border-radius: 50%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .ia-icon-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 calc(20px * var(--ia-scale)); box-sizing: border-box; z-index: 2; }
  .ia-icon { width: calc(24px * var(--ia-scale)); height: calc(24px * var(--ia-scale)); transition: color 0.3s; pointer-events: none; }
  
  /* ICONS FARB-LOGIK (Wieder korrekt!) */
  .ia-emergency-toggle.is-suitcase .ia-thumb { transform: translateX(calc(var(--ia-w) - var(--ia-h))); }
  .ia-emergency-toggle:not(.is-suitcase) .map-svg { color: #fff; }
  .ia-emergency-toggle:not(.is-suitcase) .suitcase-svg { color: #666; }
  .ia-emergency-toggle.is-suitcase .map-svg { color: #666; }
  .ia-emergency-toggle.is-suitcase .suitcase-svg { color: #fff; }

  /* MICKEY HAND & WELLEN SETUP */
  .ia-mickey-hint {
    position: absolute;
    top: 55%; left: var(--hand-start-x);
    width: var(--hand-size); height: auto;
    pointer-events: none;
    opacity: 0.95;
    animation: mickeyGroove var(--hand-speed) ease-in-out infinite;
    z-index: 10;
    transform-origin: center bottom;
  }

  .ia-mickey-hand { width: 100%; height: 100%; filter: drop-shadow(1px 3px 5px rgba(0,0,0,0.4)); overflow: visible; }
  .ia-mickey-hand path { fill: #fff; stroke: #fff; stroke-width: 0px; }

  .ia-ripple {
    position: absolute; top: 25%; left: 25%;
    width: 15px; height: 15px; background: var(--ripple-color);
    border-radius: 50%; transform: translate(-50%, -50%) scale(0);
    animation: rippleEffect var(--hand-speed) ease-in-out infinite;
  }

  @keyframes mickeyGroove {
    0%, 100% { transform: translateX(0) rotate(calc(var(--hand-tilt) * -1)); }
    15%, 85% { transform: translateX(0) rotate(calc(var(--hand-tilt) * -1)); } 
    50% { transform: translateX(var(--hand-distance)) rotate(var(--hand-tilt)); }
    65% { transform: translateX(var(--hand-distance)) rotate(var(--hand-tilt)); }
  }

  @keyframes rippleEffect {
    0%, 100%, 15%, 50%, 85% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    5%, 55% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    12%, 62% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
  }
</style>

<script>
  (function() {
    const MAP_ID = "697ba7fbcf5bfecdf2fbda6b"; 
    const LIST_ID = "696de09bbc8a902b21afbfd1"; 

    function setIAViewState(isSuitcase) {
      const map = document.querySelector('[data-id="' + MAP_ID + '"]');
      const list = document.querySelector('[data-id="' + LIST_ID + '"]');

      if (map && list) {
        [map, list].forEach(el => el.style.setProperty('transition', 'opacity 0.4s ease-in-out', 'important'));
        if (isSuitcase) {
          map.style.setProperty('opacity', '0', 'important'); map.style.setProperty('pointer-events', 'none', 'important');
          list.style.setProperty('opacity', '1', 'important'); list.style.setProperty('pointer-events', 'auto', 'important');
        } else {
          map.style.setProperty('opacity', '1', 'important'); map.style.setProperty('pointer-events', 'auto', 'important');
          list.style.setProperty('opacity', '0', 'important'); list.style.setProperty('pointer-events', 'none', 'important');
        }
      }
    }

    window.runIAppearToggle = function(element) {
      element.classList.toggle('is-suitcase');
      setIAViewState(element.classList.contains('is-suitcase'));
    };

    window.addEventListener('load', function() {
      setTimeout(function() {
        setIAViewState(true); // Start auf Koffer (Variante B)
      }, 1000);
    });
  })();
</script>
