<style>
  :root {
    --ia-scale: 0.6; --ia-w: calc(130px * var(--ia-scale)); --ia-h: calc(56px * var(--ia-scale));
    --ia-bg: rgba(30, 30, 30, 0.6); --ia-border: rgba(255, 255, 255, 0.2); --ia-thumb-c: #2A2A2A;
    /* ORIGINAL MICKEY PARAMETER */
    --hand-size: 18px; --hand-start-x: 12px; --hand-distance: 45px; --hand-speed: 2.8s; --hand-tilt: 12deg; --ripple-color: rgba(255, 255, 255, 0.5);
  }

  /* POSITION DES SCHALTERS */
  .ia-toggle-bottom-area { display: flex; justify-content: center; width: 100%; position: relative; z-index: 1001; margin-top: 300px; }

  /* SICHTBARKEITS-LOGIK */
  [data-id="697b7e436d4b28b8ed18b9c9"], [data-id="696de09bbc8a902b21afbfd1"], [data-id="697ba7fbcf5bfecdf2fbda6b"],
  [data-id="69806806263ec92b6b9f2ee9"], [data-id="696de6b7a91657db94e14817"], [data-id="698065d7d90582656b39d99f"],
  [data-id="69806814655aa5f8e2977b3a"], [data-id="696de6027fe5832773a20ea9"], [data-id="698067251c5dfa5d7f1fd965"],
  [data-id="6980683ac9eb0f5b705dbf01"], [data-id="696de2a8f87a3f06286a08de"],
  [data-id="697b8e871597dafc050739f6"], [data-id="697b8e8978bef8f204a9200f"], [data-id="697b8e88d12261fe790f5cb2"],
  [data-id="697b8e8858b78c25bd195e4e"], [data-id="697b8e896c172d21a9574188"], [data-id="697b8e8a152de8515fedc8a2"] 
  { opacity: 0 !important; pointer-events: none !important; transition: opacity 0.4s ease !important; }
  .ia-active { opacity: 1 !important; pointer-events: auto !important; }

  /* TOGGLE STYLING (PERFEKT BÜNDIG) */
  .ia-emergency-toggle { width: var(--ia-w); height: var(--ia-h); cursor: pointer; position: relative; }
  .ia-track { position: relative; width: 100%; height: 100%; background: var(--ia-bg); border: 1px solid var(--ia-border); border-radius: 999px; overflow: hidden; box-sizing: border-box; }
  
  /* THUMB: Deckt den Rand exakt ab */
  .ia-thumb { 
    position: absolute; 
    top: -1px; left: -1px; /* Setzt sich direkt auf den Rand */
    height: calc(100% + 2px); 
    width: var(--ia-h); 
    background: var(--ia-thumb-c); 
    border-radius: 50%; 
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1;
  }
  
  .ia-emergency-toggle.is-suitcase .ia-thumb { transform: translateX(calc(var(--ia-w) - var(--ia-h))); }

  /* ICON BOX: Zentriert die Icons im Thumb */
  .ia-icon-box { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    display: flex; justify-content: space-between; align-items: center; 
    /* Zentrierung im Schiebekreis: (Kreisdurchmesser / 2) - (Icon / 2) */
    padding: 0 calc((var(--ia-h) / 2) - (24px * var(--ia-scale) / 2)); 
    box-sizing: border-box; z-index: 2; 
  }

  .ia-icon { width: calc(24px * var(--ia-scale)); height: calc(24px * var(--ia-scale)); transition: color 0.3s; pointer-events: none; }
  .ia-emergency-toggle:not(.is-suitcase) .map-svg { color: #fff; }
  .ia-emergency-toggle.is-suitcase .suitcase-svg { color: #fff; }
  .ia-emergency-toggle:not(.is-suitcase) .suitcase-svg, .ia-emergency-toggle.is-suitcase .map-svg { color: #666; }

  /* ORIGINAL MICKEY ANIMATIONEN */
  .ia-mickey-hint { position: absolute; top: 55%; left: var(--hand-start-x); width: var(--hand-size); animation: mickeyGroove var(--hand-speed) ease-in-out infinite; pointer-events: none; z-index: 10; transform-origin: center bottom; }
  .ia-mickey-hand { width: 100%; height: 100%; filter: drop-shadow(1px 3px 5px rgba(0,0,0,0.4)); }
  .ia-mickey-hand path { fill: #fff; stroke: #fff; stroke-width: 0px; }
  .ia-ripple { position: absolute; top: 25%; left: 25%; width: 15px; height: 15px; background: var(--ripple-color); border-radius: 50%; transform: translate(-50%, -50%) scale(0); animation: rippleEffect var(--hand-speed) ease-in-out infinite; }

  @keyframes mickeyGroove {
    0%, 100% { transform: translateX(0) rotate(calc(var(--hand-tilt) * -1)); }
    15%, 85% { transform: translateX(0) rotate(calc(var(--hand-tilt) * -1)); }
    50% { transform: translateX(var(--hand-distance)) rotate(var(--hand-tilt)); }
    65% { transform: translateX(var(--hand-distance)) rotate(var(--hand-tilt)); }
  }
  @keyframes rippleEffect {
    0%, 100%, 15%, 50%, 85% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    5%, 55% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    12%, 62% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
  }

  /* Navigation & Nav-Btn Style */
  .ia-guide-nav-container { display: flex; justify-content: center; width: 100%; margin-bottom: 20px; position: relative; z-index: 1000; }
  .ia-nav-wrapper { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 50px; border: 0.5px solid rgba(255,255,255,0.1); }
  .ia-nav-btn { background: #222; border: 0.2px solid rgba(255,255,255,0.4); color: #fff; border-radius: 50px; cursor: pointer; padding: 4px 12px; }
  #step-counter-label { font-family: sans-serif; color: #fff; font-size: 12px; min-width: 60px; text-align: center; }
</style>

<script>
(function() {
  const PATH_A = {
    1: { text: "697b7e436d4b28b8ed18b9c9", suitcase: "696de09bbc8a902b21afbfd1", map: "697ba7fbcf5bfecdf2fbda6b" },
    2: { text: "69806806263ec92b6b9f2ee9", suitcase: "696de6b7a91657db94e14817", map: "698065d7d90582656b39d99f" },
    3: { text: "69806814655aa5f8e2977b3a", suitcase: "696de6027fe5832773a20ea9", map: "698067251c5dfa5d7f1fd965" },
    4: { text: "6980683ac9eb0f5b705dbf01", suitcase: "696de2a8f87a3f06286a08de", map: "696de2a8f87a3f06286a08de" }
  };
  const ICONS = ["697b8e871597dafc050739f6", "697b8e8978bef8f204a9200f", "697b8e88d12261fe790f5cb2", "697b8e8858b78c25bd195e4e", "697b8e896c172d21a9574188", "697b8e8a152de8515fedc8a2"];

  let currentStep = 1; let isSuitcase = true; let mickeyClicked = false;

  window.handleToggleClick = function(el) {
    mickeyClicked = true; isSuitcase = !isSuitcase;
    el.classList.toggle('is-suitcase', isSuitcase); updateView();
  };

  window.changeStep = function(dir) {
    currentStep += dir; if (currentStep > 4) currentStep = 1; if (currentStep < 1) currentStep = 4;
    updateView();
  };

  function updateView() {
    document.getElementById('step-counter-label').innerText = `Schritt ${currentStep}`;
    document.getElementById('mickey-layer').style.display = (currentStep === 1 && !mickeyClicked) ? 'block' : 'none';
    document.getElementById('ia-toggle-widget').style.display = (currentStep === 4) ? 'none' : 'inline-block';
    document.querySelectorAll('.ia-active').forEach(el => el.classList.remove('ia-active'));

    const step = PATH_A[currentStep];
    const show = (id) => { const el = document.querySelector('[data-id="' + id + '"]'); if (el) el.classList.add('ia-active'); };
    show(step.text); show(isSuitcase ? step.suitcase : step.map);
    if (currentStep === 4) { ICONS.forEach(id => show(id)); }
  }

  const safetyLoop = setInterval(updateView, 200); setTimeout(() => clearInterval(safetyLoop), 5000);
  updateView();
})();
</script>
