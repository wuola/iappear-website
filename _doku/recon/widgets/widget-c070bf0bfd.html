<style>
  /* Die Schreib-Animation */
  @keyframes signContract {
    0% {
      transform: translate(0, 0) rotate(0deg);
    }
    20% {
      /* Stift bewegt sich zum Start der Linie und neigt sich */
      transform: translate(-18px, -4px) rotate(-20deg);
    }
    40% {
      /* Kritzelbewegung 1 */
      transform: translate(-12px, -2px) rotate(-5deg);
    }
    60% {
      /* Kritzelbewegung 2 */
      transform: translate(-6px, -4px) rotate(-20deg);
    }
    80% {
      /* Kritzelbewegung 3 */
      transform: translate(-2px, -2px) rotate(-5deg);
    }
    100% {
      /* Zurück zur Ruheposition */
      transform: translate(0, 0) rotate(0deg);
    }
  }

  .pen-group {
    /* Damit sich der Stift um seine eigene Mitte dreht */
    transform-origin: center;
    transform-box: fill-box;
  }

  .contract-icon:hover .pen-group {
    animation: signContract 1s ease-in-out;
  }
</style>

</svg>
