</div>

<style>
  :root {
    --ia-scale: 0.6;
    --ia-w: calc(130px * var(--ia-scale));
    --ia-h: calc(56px * var(--ia-scale));
    --ia-bg: rgba(30, 30, 30, 0.6);
    --ia-border: rgba(255, 255, 255, 0.2);
    --ia-thumb-c: #2A2A2A;
    
    /* POSITIONIERUNG FÜR DICH ZUM ANPASSEN */
    --decision-pos-y: 350px; /* Höhe der Station/Route Buttons */
    --toggle-pos-y: 350px;   /* Höhe des Schiebereglers in Schritt 4 */
  }

  .ia-nav-btn-b, .ia-decision-btn {
    width: auto !important;
    min-width: 40px;
    flex: 0 0 auto !important;
    display: inline-block !important;
    white-space: nowrap;
    background: #222; 
    border: 0.2px solid rgba(255,255,255,0.4); 
    color: #fff; 
    border-radius: 50px; 
    cursor: pointer;
    font-family: sans-serif;
  }

  .ia-guide-nav-container-b { display: flex; justify-content: center; width: 100%; margin-bottom: 20px; position: relative; z-index: 1000; }
  .ia-nav-wrapper-b { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 50px; border: 0.5px solid rgba(255,255,255,0.1); }
  .ia-nav-btn-b { padding: 4px 12px; font-size: 13px; }
  #step-counter-label-b { font-family: sans-serif; color: #fff; font-size: 12px; min-width: 60px; text-align: center; }

  .ia-decision-container { 
    display: none; justify-content: center; align-items: center; gap: 12px; 
    position: absolute; width: 100%; top: var(--decision-pos-y); z-index: 1002; 
  }
  .ia-decision-btn { padding: 8px 20px; font-size: 13px; }

  .ia-toggle-bottom-area-b { 
    display: flex; justify-content: center; width: 100%; 
    position: absolute; top: var(--toggle-pos-y); z-index: 1001; 
  }

  .ia-emergency-toggle-b { width: var(--ia-w); height: var(--ia-h); cursor: pointer; position: relative; }
  .ia-track-b { position: relative; width: 100%; height: 100%; background: var(--ia-bg); border: 1px solid var(--ia-border); border-radius: 999px; overflow: hidden; box-sizing: border-box; }
  .ia-thumb-b { position: absolute; top: -1px; left: -1px; height: calc(100% + 2px); width: var(--ia-h); background: var(--ia-thumb-c); border-radius: 50%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
  .ia-emergency-toggle-b.is-suitcase-b .ia-thumb-b { transform: translateX(calc(var(--ia-w) - var(--ia-h))); }

  .ia-icon-box-b { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 calc((var(--ia-h) / 2) - (24px * var(--ia-scale) / 2)); box-sizing: border-box; z-index: 2; }
  .ia-icon-b { width: calc(24px * var(--ia-scale)); height: calc(24px * var(--ia-scale)); transition: color 0.3s; pointer-events: none; }
  
  .ia-emergency-toggle-b:not(.is-suitcase-b) .map-svg-b { color: #fff; }
  .ia-emergency-toggle-b.is-suitcase-b .suitcase-svg-b { color: #fff; }
  .ia-emergency-toggle-b:not(.is-suitcase-b) .suitcase-svg-b, .ia-emergency-toggle-b.is-suitcase-b .map-svg-b { color: #666; }

  /* VISIBILITY (IDs für alle Schritte) */
  [data-id="698068591db74ce048dabf3f"], [data-id="696de2023c0c9a007e35d172"], [data-id="697b78a3369fc60ffbc02453"], [data-id="697b78e39bd5b6f5c6675624"],
  [data-id="6980686dc9eb0f5b705dc2d1"], [data-id="697b8ff848dc7aca24487d4a"], [data-id="697b8fd105eead7e00488044"], [data-id="6980b766fc4ba55d0166d38d"],
  [data-id="6980b8a39018eefe9ee11c64"], [data-id="6980baa822769ff68f949c40"],
  [data-id="6980bb34655aa5f8e2ca4386"], [data-id="6980bb35812f128bb124908a"], [data-id="6980bb35e57e04002b1a675a"],
  [data-id="6980bb351bae6f1870506450"], [data-id="6980bb35c9a391c49bf91943"], [data-id="6980bb3665a5f7a88192371a"],
  [data-id="6980c7759018eefe9eeec08d"], [data-id="6980c7a0812f128bb12e9886"], [data-id="6980d2e285b1e77f9b4e5d11"]
  { opacity: 0 !important; pointer-events: none !important; transition: opacity 0.4s ease !important; }

  .ia-active-b { opacity: 1 !important; pointer-events: auto !important; }
</style>

<script>
(function() {
  const PATH_B = {
    1: { ids: ["698068591db74ce048dabf3f", "696de2023c0c9a007e35d172", "697b78a3369fc60ffbc02453", "697b78e39bd5b6f5c6675624"] },
    2: { ids: ["6980686dc9eb0f5b705dc2d1", "697b8ff848dc7aca24487d4a", "697b8fd105eead7e00488044", "6980b766fc4ba55d0166d38d"] },
    3: { ids: ["6980b8a39018eefe9ee11c64", "6980baa822769ff68f949c40", "6980bb34655aa5f8e2ca4386", "6980bb35812f128bb124908a", "6980bb35e57e04002b1a675a", "6980bb351bae6f1870506450", "6980bb35c9a391c49bf91943", "6980bb3665a5f7a88192371a"] },
    4: { 
        text: "6980d2e285b1e77f9b4e5d11", 
        map: "6980c7759018eefe9eeec08d", 
        suitcase: "6980c7a0812f128bb12e9886" 
    },
    // Schritt 5 nutzt die IDs von Schritt 3
    5: { ids: ["6980b8a39018eefe9ee11c64", "6980baa822769ff68f949c40", "6980bb34655aa5f8e2ca4386", "6980bb35812f128bb124908a", "6980bb35e57e04002b1a675a", "6980bb351bae6f1870506450", "6980bb35c9a391c49bf91943", "6980bb3665a5f7a88192371a"] }
  };

  let currentStepB = 1; 
  let isSuitcaseB = false;

  window.handleToggleClickB = function(el) {
    isSuitcaseB = !isSuitcaseB; 
    el.classList.toggle('is-suitcase-b', isSuitcaseB); 
    updateViewB();
  };

  window.goToPathB = function(step) {
    currentStepB = step;
    updateViewB();
  };

  window.changeStepB = function(dir) {
    if (currentStepB === 2 && dir === 1) return;
    
    // Schritt 3 & 5 führen beim Weiterklicken zurück zum Anfang
    if ((currentStepB === 3 || currentStepB === 5) && dir === 1) { 
        currentStepB = 1; 
    } 
    // Navigation für Schritt 5 zurück zu 4
    else if (currentStepB === 5 && dir === -1) {
        currentStepB = 4;
    }
    // Navigation für 3 & 4 zurück zu 2
    else if ((currentStepB === 3 || currentStepB === 4) && dir === -1) { 
        currentStepB = 2; 
    } 
    else {
        currentStepB += dir;
        if (currentStepB > 5) currentStepB = 1;
        if (currentStepB < 1) currentStepB = 5;
    }
    updateViewB();
  };

  function updateViewB() {
    document.getElementById('step-counter-label-b').innerText = `Schritt ${currentStepB}`;
    
    document.getElementById('ia-decision-box-b').style.display = (currentStepB === 2) ? 'flex' : 'none';
    document.getElementById('ia-toggle-area-b').style.display = (currentStepB === 4) ? 'flex' : 'none';
    document.getElementById('ia-next-arrow-b').style.visibility = (currentStepB === 2) ? 'hidden' : 'visible';

    document.querySelectorAll('.ia-active-b').forEach(el => el.classList.remove('ia-active-b'));

    const stepData = PATH_B[currentStepB];
    if (stepData) {
      if (currentStepB === 4) {
        const txt = document.querySelector('[data-id="' + stepData.text + '"]');
        if (txt) txt.classList.add('ia-active-b');
        const activeId = isSuitcaseB ? stepData.suitcase : stepData.map;
        const screen = document.querySelector('[data-id="' + activeId + '"]');
        if (screen) screen.classList.add('ia-active-b');
      } else {
        stepData.ids.forEach(id => {
          const el = document.querySelector('[data-id="' + id + '"]');
          if (el) el.classList.add('ia-active-b');
        });
      }
    }
  }

  setInterval(updateViewB, 250);
  updateViewB();
})();
</script>
