<script>
(function() {
    let timer;
    const btnId = "696f5bb19b88c8ad502f7ec9";
    const bgId = "69785c3e5120b5d20dfe4f39";
    const logoId = "698aeb86a193584059bdfbd3"; // Die korrigierte ID
    const textIds = [
        logoId, "6988a01024e59450dd83f023", "6988a0870327652e6cb9088e", "698225046923ed586bf32c63",
        "69785cbfe9c704522aca4518", "69785cc1e9c704522aca451b", "69785cc0f82ac36e6fec742a",
        "69785cc05e5cc4dc19ad5681", "69785cbf0cd81b5752f54986", "69785cc1e13ef4295cfbd673",
        "69785cc0da5e834be668a96f", "69785cc16b44d4485725e19c", "69785cc0fe0e7d9f633d8b77"
    ];

    const safeZone = new Set([btnId, bgId, ...textIds]);

    // Klick-Event für das Logo
    document.addEventListener('click', function(e) {
        const logoElement = e.target.closest(`[data-id="${logoId}"]`);
        if (logoElement) {
            window.location.href = 'https://iappear.at/home';
        }
    });

    // Hover-Logik zum Öffnen/Schließen
    const handleGlobalMouse = (e) => {
        const hovered = e.target.closest('[data-id]');
        const currentId = hovered ? hovered.getAttribute('data-id') : null;

        if (safeZone.has(currentId)) {
            clearTimeout(timer);
            document.body.classList.add('menu-open');
        } else {
            clearTimeout(timer);
            timer = setTimeout(() => {
                document.body.classList.remove('menu-open');
            }, 150); 
        }
    };

    document.addEventListener('mouseover', handleGlobalMouse);
})();
</script>
