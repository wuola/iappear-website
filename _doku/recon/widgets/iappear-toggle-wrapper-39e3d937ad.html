<div class="iappear-toggle-wrapper" onclick="toggleIAppear(this)">
  <div class="toggle-background">
    <div class="toggle-thumb"></div>
    
    <div class="icon-container">
      <svg class="icon map-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 6V22L8 18L15 22L22 18V2L15 6L8 2L1 6Z"></path>
        <path d="M8 2V18"></path>
        <path d="M15 6V22"></path>
      </svg>
      
      <svg class="icon suitcase-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="8" width="18" height="12" rx="2"></rect>
        <path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </div>
  </div>
</div>

<style>
  :root {
    /* DEINE REGLER */
    --toggle-width: 120px;
    --toggle-height: 54px;
    --bg-color: #121212;      /* Dunkler Hintergrund des Toggles */
    --thumb-color: #2A2A2A;   /* Farbe des gleitenden Kreises */
    --icon-active: #FFFFFF;   /* Weiße Icons */
    --icon-inactive: #666666; /* Ausgegraute Icons */
    --transition-speed: 0.3s;
  }

  .iappear-toggle-wrapper {
    width: var(--toggle-width);
    height: var(--toggle-height);
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
  }

  .toggle-background {
    position: relative;
    width: 100%;
    height: 100%;
    background-color: var(--bg-color);
    border-radius: 100px;
    display: flex;
    align-items: center;
    padding: 4px; /* Abstand des Kreises zum Rand */
    box-sizing: border-box;
  }

  /* Der Kreis, der sich bewegt */
  .toggle-thumb {
    position: absolute;
    height: calc(var(--toggle-height) - 8px);
    width: calc((var(--toggle-width) / 2) - 6px);
    background-color: var(--thumb-color);
    border-radius: 100px;
    transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1;
  }

  /* Icons Positionierung */
  .icon-container {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 2;
    left: 0;
  }

  .icon {
    width: 24px;
    height: 24px;
    color: var(--icon-inactive);
    transition: color var(--transition-speed);
  }

  /* ZUSTAND: KARTE AKTIV (Standard) */
  .iappear-toggle-wrapper.is-suitcase .toggle-thumb {
    transform: translateX(calc(var(--toggle-width) / 2 - 2px));
  }

  .iappear-toggle-wrapper:not(.is-suitcase) .map-icon {
    color: var(--icon-active);
  }

  .iappear-toggle-wrapper.is-suitcase .suitcase-icon {
    color: var(--icon-active);
  }
</style>

<script>
  function toggleIAppear(element) {
    element.classList.toggle('is-suitcase');
    
    // Optional: Hier kannst du Events auslösen, 
    // z.B. andere Readymag-Elemente ein/ausblenden
    if (element.classList.contains('is-suitcase')) {
      console.log("Modus: Koffer (Tours)");
    } else {
      console.log("Modus: Karte");
    }
  }
</script>
