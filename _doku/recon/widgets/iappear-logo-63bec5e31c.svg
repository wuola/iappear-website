<svg height="100%" width="100%" viewBox="0 0 49.68 93.27" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .iappear-logo {
        fill: #ffffff;
        transform-origin: center;
        transform-box: fill-box;
        -webkit-tap-highlight-color: transparent; /* Verhindert den standardmäßigen blauen Kasten bei iOS */
        transition: transform 0.1s ease-out;
      }

      /* Feedback beim Antippen (Mobile) */
      .iappear-logo:active {
        transform: scale(0.95); /* Logo wird beim Tap minimal kleiner */
        opacity: 0.7;
      }
    </style>
  </defs>
  <a href="https://www.iappear.at/home" target="_parent" style="display: block; width: 100%; height: 100%;">
