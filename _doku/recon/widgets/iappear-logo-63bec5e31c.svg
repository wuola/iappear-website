      <g>
        <path d="M49.68,24.84c0,13.72-11.12,24.84-24.84,24.84S0,38.56,0,24.84,11.12,0,24.84,0s24.84,11.12,24.84,24.84ZM40.7,24.82c0-8.76-7.11-15.87-15.87-15.87s-15.87,7.11-15.87,15.87,7.11,15.87,15.87,15.87,15.87-7.11,15.87-15.87Z"></path>
        <circle r="5.8" cy="24.81" cx="24.86"></circle>
