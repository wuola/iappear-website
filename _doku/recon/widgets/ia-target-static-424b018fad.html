<div class="ia-target-static">
  <style>
    .ia-target-static {
      /* --- DEINE PARAMETER --- */
      --target-color: #ffffff; 
      --stroke-width: 8px; 
      --target-opacity: 0.5; 
      --target-size: 45px; 

      width: var(--target-size);
      height: var(--target-size);
      display: inline-block;
    }

    .target-svg-static {
      width: 100%;
      height: 100%;
      display: block;
      opacity: var(--target-opacity);
    }

    .outer-ring-static {
      fill: none;
      stroke: var(--target-color);
      stroke-width: var(--stroke-width);
    }

    .inner-dot-static {
      fill: var(--target-color);
      stroke: none;
    }
  </style>

  <svg viewBox="0 0 100 100" class="target-svg-static">
    <circle r="25" cy="50" cx="50" class="outer-ring-static"></circle>
    <circle r="8" cy="50" cx="50" class="inner-dot-static"></circle>
  </svg>
</div>
