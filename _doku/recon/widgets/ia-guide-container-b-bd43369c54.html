  .ia-toggle-scaler-b {
    /* Absolute Positionierung + Skalierung */
    position: absolute;
    top: var(--pos-toggle-top);
    
    transform: scale(var(--ia-scale));
    transform-origin: center top;
    backface-visibility: hidden;
    -webkit-font-smoothing: antialiased;
    pointer-events: auto;
    
    /* Flexbox für Zentrierung im Scaler */
    display: flex;
    justify-content: center;
    width: 100%;
  }

  /* --- TOGGLE TRACK (Safari Safe) --- */
  .ia-emergency-toggle-b {
    width: var(--base-w);
    height: var(--base-h);
    position: relative;
    cursor: pointer;
    isolation: isolate; 
  }

  .ia-track-b {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--ia-bg);
    border: 2px solid var(--ia-border);
    border-radius: 999px;
    overflow: hidden;
    box-sizing: border-box;
    -webkit-mask-image: -webkit-radial-gradient(white, black);
  }

  /* --- THUMB --- */
  .ia-thumb-b {
    position: absolute;
    top: -1px; left: -1px;
    width: var(--thumb-s);
    height: var(--thumb-s);
    background: var(--ia-thumb-c);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    box-sizing: border-box;
    z-index: 1;
    
    /* Hardware Beschleunigung */
    will-change: transform;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    transform: translate3d(0, 0, 0);
  }

  /* Toggle Active State */
  .ia-emergency-toggle-b.is-suitcase-b .ia-thumb-b {

<script>
(function() {
  const PATH_B = {
    1: { ids: ["698068591db74ce048dabf3f", "696de2023c0c9a007e35d172", "697b78a3369fc60ffbc02453", "697b78e39bd5b6f5c6675624"] },
    2: { ids: ["6980686dc9eb0f5b705dc2d1", "697b8ff848dc7aca24487d4a", "697b8fd105eead7e00488044", "6980b766fc4ba55d0166d38d"] },
    3: { ids: ["6980b8a39018eefe9ee11c64", "6980baa822769ff68f949c40", "6980bb34655aa5f8e2ca4386", "6980bb35812f128bb124908a", "6980bb35e57e04002b1a675a", "6980bb351bae6f1870506450", "6980bb35c9a391c49bf91943", "6980bb3665a5f7a88192371a"] },
    4: { 
        text: "6980d2e285b1e77f9b4e5d11", 
        map: "6980c7759018eefe9eeec08d", 
        suitcase: "6980c7a0812f128bb12e9886" 
    },
    5: { ids: ["6980b8a39018eefe9ee11c64", "6980baa822769ff68f949c40", "6980bb34655aa5f8e2ca4386", "6980bb35812f128bb124908a", "6980bb35e57e04002b1a675a", "6980bb351bae6f1870506450", "6980bb35c9a391c49bf91943", "6980bb3665a5f7a88192371a"] }
  };

  let currentStepB = 1; 
  let isSuitcaseB = false;

  window.handleToggleClickB = function(el) {
    isSuitcaseB = !isSuitcaseB; 
    if(isSuitcaseB) {
        el.classList.add('is-suitcase-b');
    } else {
        el.classList.remove('is-suitcase-b');
    }
    updateViewB();
  };

  window.goToPathB = function(step) {
    currentStepB = step;
    updateViewB();
  };

  window.changeStepB = function(dir) {
    // Schritt 2 Blockade (man muss die Buttons klicken)
    if (currentStepB === 2 && dir === 1) return;
    
    // Loops und Navigation Logic
    if ((currentStepB === 3 || currentStepB === 5) && dir === 1) { 
        currentStepB = 1; 
    } 
    else if (currentStepB === 5 && dir === -1) {
        currentStepB = 4;
    }
    else if ((currentStepB === 3 || currentStepB === 4) && dir === -1) { 
        currentStepB = 2; 
    } 
    else {
        currentStepB += dir;
        if (currentStepB > 5) currentStepB = 1;
        if (currentStepB < 1) currentStepB = 5;
    }
    updateViewB();
  };

  function updateViewB() {
    const label = document.getElementById('step-counter-label-b');
    if(label) label.innerText = `Schritt ${currentStepB}`;
    
    // UI Elemente steuern
    const box = document.getElementById('ia-decision-box-b');
    if(box) box.style.display = (currentStepB === 2) ? 'flex' : 'none';

    const toggle = document.getElementById('ia-toggle-scaler-b');
    if(toggle) toggle.style.display = (currentStepB === 4) ? 'flex' : 'none';

    const arrow = document.getElementById('ia-next-arrow-b');
    if(arrow) arrow.style.visibility = (currentStepB === 2) ? 'hidden' : 'visible';

    // Content Switching
    document.querySelectorAll('.ia-active-b').forEach(el => el.classList.remove('ia-active-b'));

    const stepData = PATH_B[currentStepB];
    if (stepData) {
      if (currentStepB === 4) {
        show(stepData.text);
        show(isSuitcaseB ? stepData.suitcase : stepData.map);
      } else {
        stepData.ids.forEach(id => show(id));
      }
    }
  }

  function show(id) {
    const el = document.querySelector('[data-id="' + id + '"]');
    if (el) el.classList.add('ia-active-b');
  }

  const safetyLoop = setInterval(updateViewB, 250);
  setTimeout(() => clearInterval(safetyLoop), 5000);
  updateViewB();
})();
</script>
