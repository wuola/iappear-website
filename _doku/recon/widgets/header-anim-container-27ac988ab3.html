<div id="header-anim-container" aria-label="Die Plattform für digitale Erlebnisse – animierter Schriftzug" style="width:100%; height:auto; cursor: pointer; -webkit-tap-highlight-color: transparent;">
  <svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg" style="display:block; shape-rendering:geometricPrecision;&lt;title&gt;Die Plattform für digitale Erlebnisse&lt;/title&gt;">
    <style>
      :root {
        /* HIER DIE SCHRIFTFARBE ÄNDERN */
        --text-color: #848484; 
      }

      .drift-text {
        font-family: 'Georgia', serif;
        font-size: 18px;
        fill: var(--text-color); /* Verwendet die oben definierte Farbe */
        /* Zeit auf 0.2s verkürzt für sofortiges Feedback */
        transition: transform 0.2s ease-out, opacity 0.2s ease-out; 
        pointer-events: none;
        will-change: transform, opacity; /* Optimiert das Rendering vorab */
      }

      /* Hover-Effekt: Jetzt schneller und etwas präziser */
      #header-anim-container:hover .line-1 { transform: translate(5px, -1px); opacity: 0.8; }
      #header-anim-container:hover .line-2 { transform: translate(-3px, 0px); }
      #header-anim-container:hover .line-3 { transform: translate(7px, 2px); opacity: 0.85; }
      #header-anim-container:hover .line-4 { transform: translate(-4px, 4px); }
      
      .line-1, .line-2, .line-3, .line-4 { transform: translate(0, 0); }
    </style>

    <text x="25" y="35" class="drift-text line-1">Die</text>
    <text x="25" y="49" class="drift-text line-2">Plattform</text>
    <text x="25" y="63" class="drift-text line-3">für digitale</text>
    <text x="25" y="77" class="drift-text line-4">Erlebnisse</text>
  </svg>
</div>
