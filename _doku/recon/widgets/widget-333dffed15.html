<style>
  /* Der Würfel als Gruppe */
  .box-group {
    transform-origin: center center;
    /* Eine "bouncy" Transition für das spielerische Gefühl */
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* HOVER-EFFEKT */
  .content-icon:hover .box-group {
    /* Hebt ab (-12px), dreht sich leicht (5deg) und kommt näher (scale 1.1) */
    transform: translateY(-12px) rotate(5deg) scale(1.1);
  }
</style>
