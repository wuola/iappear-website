<style>
  :root {
    /* --- MASTER SKALIERUNG --- */
    --scale: 0.7;                     

    /* --- DESIGN PARAMETER --- */
    --contact-bg: transparent;        
    --text-primary: #ffffff;         
    --text-secondary: #ffffff;       
    --accent-color: #ffffff;         
    --font-family: 'Inter', sans-serif;

    /* Berechnete Werte */
    --icon-size: calc(22px * var(--scale)); 
    --font-size-header: calc(18px * var(--scale));
    --font-size-main: calc(16px * var(--scale));
    --font-size-sub: calc(14px * var(--scale));
    --spacing-inner: calc(15px * var(--scale));
    --spacing-items: calc(20px * var(--scale)); /* Etwas kompakter */
  }

  .contact-container {
    font-family: var(--font-family);
    color: var(--text-primary);
    background: var(--contact-bg);
    /* Zentrierung des gesamten Blocks */
    width: fit-content; 
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: var(--spacing-items);
  }

  .brand-header {
    font-size: var(--font-size-header);
    letter-spacing: calc(2px * var(--scale));
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: calc(10px * var(--scale));
    /* Zentrierung über dem Text */
    text-align: center;
    width: 100%;
    /* Strich entfernt */
    border: none; 
  }

  .contact-row {
    display: flex;
    align-items: flex-start;
    gap: var(--spacing-inner);
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  a.contact-row:hover {
    transform: translateX(calc(5px * var(--scale)));
    opacity: 0.8;
  }
  
  .icon-box {
    width: var(--icon-size);
    height: var(--icon-size);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    margin-top: calc(2px * var(--scale));
  }

  /* Icons mit Füllung (Pin, Tel, Mail) */
  .icon-box.filled svg {
    fill: var(--text-primary);
    stroke: none;
  }

  /* Icon mit Linien (Globus) */
  .icon-box.outline svg {
    fill: none;
    stroke: var(--text-primary);
    stroke-width: 2;
  }

  .content-box {
    display: flex;
    flex-direction: column;
    line-height: 1.4;
  }

  .main-text {
    font-size: var(--font-size-main);
    font-weight: 500;
    white-space: nowrap; /* Verhindert ungewollte Umbrüche */
  }

  .sub-text {
    font-size: var(--font-size-sub);
    color: var(--text-secondary);
  }

  svg {
    width: 100%;
    height: 100%;
  }
</style>
